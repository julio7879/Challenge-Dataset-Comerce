<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Data Commerce Challenge Store">
    <title>Tienda | Data Commerce Challenge</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/store.css">
</head>
<body>

    <!-- Header -->
    <header class="store-header">
        <a href="index.html" class="store-header__brand">
            <span>🌿</span> Data Commerce
        </a>
        <nav class="store-nav">
            <a href="admin.html" class="store-nav__link">Dashboard Admin</a>
            <button class="cart-toggle" id="cart-toggle">
                🛒 Carrito
                <span class="cart-count" id="cart-count">0</span>
            </button>
        </nav>
    </header>

    <!-- Banner -->
    <section class="store-banner">
        <div class="store-banner__content">
            <h1>Descubre Nuestra Colección Botánica</h1>
            <p>Plantas de interior premium para dar vida a tus espacios.</p>
        </div>
    </section>

    <!-- Catalog Section -->
    <main class="catalog-section">
        <div class="catalog-controls">
            <input type="text" id="search-input" class="search-input" placeholder="Buscar plantas por nombre...">
            <select id="filter-select" class="search-input" style="flex: 0 1 200px;">
                <option value="all">Todos los productos</option>
                <option value="in-stock">En Stock</option>
            </select>
        </div>

        <div class="products-grid" id="products-grid">
            <!-- Los productos se cargarán dinámicamente aquí mediante JS -->
        </div>
    </main>

    <!-- Cart Overlay -->
    <div class="cart-overlay" id="cart-overlay"></div>

    <!-- Cart Sidebar -->
    <aside class="cart-sidebar" id="cart-sidebar">
        <div class="cart-header">
            <h2>Tu Carrito</h2>
            <button class="close-cart" id="close-cart">✕</button>
        </div>
        
        <div class="cart-items" id="cart-items">
            <!-- Los ítems del carrito se cargarán aquí -->
            <div style="text-align: center; color: var(--text-muted); margin-top: 2rem;">
                Tu carrito está vacío.
            </div>
        </div>

        <div class="cart-footer">
            <div class="cart-total">
                <span>Total:</span>
                <span id="cart-total-price">$0</span>
            </div>
            <button class="btn btn--primary" id="checkout-btn" style="width: 100%;">Confirmar Compra</button>
            <button class="btn" id="empty-cart-btn" style="width: 100%; margin-top: 0.5rem; background: var(--bg-card); color: var(--color-error); border: 1px solid var(--border-color);">Vaciar Carrito</button>
        </div>
    </aside>

    <!-- Toast Notifications Container -->
    <div class="toast-container" id="toast-container"></div>

    <script src="js/main.js"></script>
</body>
</html>
